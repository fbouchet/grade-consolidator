# ============================================================
# consolidate-grades — example config
# ============================================================

# ----- Required -----
master_file: students_master.csv
grade_files:
  - notes_groupe_A.csv
  - notes_groupe_B.xlsx
# OR scan a directory:
# grade_dir: ta_grades/
output_file: moodle_import.csv

# ----- Output column headers -----
# Prompted on first run, saved here. Become the column names in
# the output CSV imported into Moodle.
exam_name: "Partiel Mars 2026"
id_column_name: "Numéro d'identification"

# ----- Grade bounds (optional) -----
# When a parsed grade falls outside [min, max], the script prompts
# you to confirm clamping. Confirmation is saved per file under
# column_overrides.<filename>.clamp_above / clamp_below.
min_grade: 0
max_grade: 20

# ----- Extra "absent" tokens -----
# Extends the built-in set (ABS, ABSENCE, DEF, DÉFAILLANT, ...).
# Auto-populated when you confirm an unknown value means absent.
absent_tokens:
  - "-"
  - "NR"
  - "non rendu"

# ============================================================
# Auto-generated below — edit by hand only if you know what
# you're doing. The script populates these as you make
# interactive choices on first run.
# ============================================================

# Per-file column overrides
column_overrides:
  notes_groupe_A.csv:
    grade: "Note /20"
    clamp_above: true        # silently clamp grades > max_grade

  notes_groupe_B.xlsx:
    selected_sheets: ["DC-1", "DC-2"]
    sheet_columns:
      DC-1:
        grade: "Note /20"
      DC-2:
        grade: "Note /20"

# ID-based name mismatches you've already confirmed
name_confirmations:
  notes_groupe_A.csv:
    - "21441829"